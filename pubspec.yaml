name: resume_plus_clean
description: "Une application pour résumer des cours - Version propre."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.6.1
  # Networking
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.5.3

  # UI & UX
  lottie: ^3.1.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  
  # Audio Recording
  # Use record 5.x with namespace fix
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  file_picker: ^8.0.0

  # Text-to-Speech pour la lecture des résumés
  flutter_tts: ^4.0.2

  # Routing
  go_router: ^16.1.0

  # Icons
  cupertino_icons: ^1.0.2
  permission_handler: ^12.0.1
  
  # Image picker for profile photo
  image_picker: ^1.0.7
  
  # Secure Storage
  flutter_secure_storage: ^9.2.2
  
  # Screenshot blocking
  screen_protector: ^1.4.2
  
  # URL Launcher
  url_launcher: ^6.2.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # JSON Serialization
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0
  build_runner: ^2.4.15
  test: ^1.25.8
  json_serializable: ^6.9.5
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  record_linux: ^1.2.1
  record_platform_interface: ^1.4.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/animations/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/LogoApp.png"
  min_sdk_android: 21
  remove_alpha_ios: true