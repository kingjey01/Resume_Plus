# Configuration Apache pour Resume+ - Fichiers Media et Audio
# Fichier: /etc/httpd/conf.d/resume_media.conf

# Configuration pour les fichiers media (audio, images, etc.)
Alias /media/ /home/jey/resumecours.gestionhospitaliare.site/backend/media/
<Directory "/home/jey/resumecours.gestionhospitaliare.site/backend/media/">
    Require all granted
    Options -Indexes +FollowSymLinks
    
    # Headers CORS pour les fichiers audio
    <FilesMatch "\.(mp3|wav|m4a|ogg|webm|aac|flac)$">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Range, Content-Range, Content-Type, Authorization"
        Header always set Accept-Ranges "bytes"
        Header always set Cache-Control "public, max-age=3600"
        
        # Support pour les requêtes OPTIONS (CORS preflight)
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </FilesMatch>
    
    # Cache pour les fichiers audio (1 heure)
    <FilesMatch "\.(mp3|wav|m4a|ogg|webm|aac|flac)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 hour"
    </FilesMatch>
    
    # Sécurité - Empêcher l'exécution de scripts
    <FilesMatch "\.(php|py|pl|cgi|sh)$">
        Require all denied
    </FilesMatch>
</Directory>

# Configuration pour les fichiers statiques (CSS, JS, images)
Alias /static/ /home/jey/resumecours.gestionhospitaliare.site/backend/staticfiles/
<Directory "/home/jey/resumecours.gestionhospitaliare.site/backend/staticfiles/">
    Require all granted
    Options -Indexes +FollowSymLinks
    
    # Cache long pour les fichiers statiques (1 mois)
    ExpiresActive On
    ExpiresDefault "access plus 1 month"
    
    # Compression gzip
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/css text/javascript application/javascript text/plain text/xml application/xml application/xml+rss text/html
    </IfModule>
</Directory>

# Configuration spéciale pour le répertoire audio_sessions
<Directory "/home/jey/resumecours.gestionhospitaliare.site/backend/media/audio_sessions/">
    Require all granted
    Options -Indexes +FollowSymLinks
    
    # Headers spéciaux pour le streaming audio
    Header always set Accept-Ranges "bytes"
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges"
    
    # Support du streaming par chunks
    <IfModule mod_rewrite.c>
        RewriteEngine On
        # Permettre les requêtes avec Range header
        RewriteCond %{HTTP:Range} bytes=
        RewriteRule .* - [E=HTTP_RANGE:1]
    </IfModule>
</Directory>

# Logs spécifiques pour le debugging
LogLevel info
CustomLog /var/log/httpd/resume_media_access.log combined
ErrorLog /var/log/httpd/resume_media_error.log